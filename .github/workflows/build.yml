name: Build Geode Mod
on:
  workflow_dispatch:
  push:
    branches: ["**"]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: Windows, os: windows-latest, target: Win64 }
          - { name: Android32, os: ubuntu-latest, target: Android32 }
          - { name: Android64, os: ubuntu-latest, target: Android64 }
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    steps:
      - uses: actions/checkout@v4
      - id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.name }}
          path: ${{ steps.build.outputs.build-output }}
